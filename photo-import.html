<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Photo Importer | Wells Family Archive</title>
<link rel="stylesheet" href="../admin-photo-import.css">
</head>
<body>
<header><h1>Wells Family Photo Importer</h1></header>
<main>
<section id="loginPanel">
<h2>Administrator sign-in</h2>
<label>Email<input id="email" type="email" autocomplete="email"></label>
<label>Password<input id="password" type="password" autocomplete="current-password"></label>
<button id="loginButton" type="button">Sign in</button>
<p id="loginStatus" class="status"></p>
</section>

<section id="uploadPanel" class="hidden">
<h2>Import photographs</h2>
<p>Select multiple JPEG, PNG, or WebP files.</p>
<label>Collection name<input id="batchName" type="text" placeholder="Example: Wells family photographs"></label>
<label>Photographs<input id="files" type="file" accept="image/jpeg,image/png,image/webp" multiple></label>
<p id="selection" class="status">No photographs selected.</p>
<button id="uploadButton" type="button" disabled>Upload photographs</button>
<progress id="progress" max="100" value="0"></progress>
<p id="uploadStatus" class="status"></p>
<button id="signOutButton" type="button">Sign out</button>
</section>
</main>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
import { SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY } from "../scripts/supabase-config.js";

const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
  auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}
});

const loginPanel=document.getElementById("loginPanel");
const uploadPanel=document.getElementById("uploadPanel");
const email=document.getElementById("email");
const password=document.getElementById("password");
const loginButton=document.getElementById("loginButton");
const loginStatus=document.getElementById("loginStatus");
const filesInput=document.getElementById("files");
const batchName=document.getElementById("batchName");
const selection=document.getElementById("selection");
const uploadButton=document.getElementById("uploadButton");
const progress=document.getElementById("progress");
const uploadStatus=document.getElementById("uploadStatus");
const signOutButton=document.getElementById("signOutButton");
let currentUser=null;

async function verifyAdmin(user){
  const {data,error}=await supabase.from("admin_profiles")
    .select("user_id,is_active").eq("user_id",user.id).eq("is_active",true).maybeSingle();
  if(error) throw error;
  if(!data) throw new Error("This account is not an active archive administrator.");
}

async function showUpload(session){
  await verifyAdmin(session.user);
  currentUser=session.user;
  loginPanel.classList.add("hidden");
  uploadPanel.classList.remove("hidden");
}

loginButton.addEventListener("click", async ()=>{
  loginStatus.textContent="Signing in…";
  const {data,error}=await supabase.auth.signInWithPassword({
    email:email.value.trim(),password:password.value
  });
  if(error){loginStatus.textContent=error.message;return;}
  try{await showUpload(data.session);loginStatus.textContent="";}
  catch(err){await supabase.auth.signOut();loginStatus.textContent=err.message;}
});

filesInput.addEventListener("change", ()=>{
  const files=[...(filesInput.files||[])];
  const mb=files.reduce((n,f)=>n+f.size,0)/1048576;
  selection.textContent=files.length?`${files.length} selected · ${mb.toFixed(1)} MB`:"No photographs selected.";
  uploadButton.disabled=!files.length;
});

function safeName(name){
  const ext=(name.split(".").pop()||"jpg").toLowerCase();
  const base=name.replace(/\.[^/.]+$/,"").replace(/[^a-zA-Z0-9_-]+/g,"-").replace(/^-|-$/g,"").toLowerCase()||"family-photo";
  return `${base}.${ext}`;
}

async function uploadOne(file){
  const path=`approved/${Date.now()}-${crypto.randomUUID()}-${safeName(file.name)}`;
  const {error:uploadError}=await supabase.storage.from("public-family-media")
    .upload(path,file,{contentType:file.type,cacheControl:"3600",upsert:false});
  if(uploadError) throw uploadError;

  const title=[batchName.value.trim(),file.name.replace(/\.[^/.]+$/,"")].filter(Boolean).join(" — ");
  const {error:dbError}=await supabase.from("media").insert({
    media_type:"photo",title,storage_path:path,is_public:true,is_approved:true,
    uploaded_by:currentUser.id,approved_by:currentUser.id,approved_at:new Date().toISOString()
  });
  if(dbError){
    await supabase.storage.from("public-family-media").remove([path]);
    throw dbError;
  }
}

uploadButton.addEventListener("click", async ()=>{
  const files=[...(filesInput.files||[])];
  uploadButton.disabled=true;
  let ok=0,failed=0;
  for(let i=0;i<files.length;i++){
    uploadStatus.textContent=`Uploading ${i+1} of ${files.length}: ${files[i].name}`;
    try{await uploadOne(files[i]);ok++;}catch(err){console.error(err);failed++;}
    progress.value=Math.round(((i+1)/files.length)*100);
  }
  uploadStatus.textContent=`Import complete: ${ok} uploaded, ${failed} failed.`;
});

signOutButton.addEventListener("click", async ()=>{
  await supabase.auth.signOut();
  location.reload();
});

const {data}=await supabase.auth.getSession();
if(data.session?.user){
  try{await showUpload(data.session);}catch(err){await supabase.auth.signOut();loginStatus.textContent=err.message;}
}
</script>
</body>
</html>
